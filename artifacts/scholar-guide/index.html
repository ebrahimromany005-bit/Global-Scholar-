    <script>
      (function () {
        var observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(function (node) {
              if (node.nodeType === 1) {
                var el = node;
                var style = window.getComputedStyle ? window.getComputedStyle(el) : {};
                if (
                  (el.tagName === 'IFRAME' && el.src && el.src.indexOf('replit') !== -1) ||
                  (el.id && (el.id.indexOf('replit') !== -1 || el.id.indexOf('consent') !== -1 || el.id.indexOf('cookie') !== -1)) ||
                  (el.className && typeof el.className === 'string' && (el.className.indexOf('replit') !== -1 || el.className.indexOf('consent') !== -1))
                ) {
                  el.remove();
                }
              }
            });
          });
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
